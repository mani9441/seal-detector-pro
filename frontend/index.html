<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seal Detector Pro | Live Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }

      /* --- 1. PREMIUM SPLASH SCREEN --- */
      .splash-container {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        pointer-events: none;
        user-select: none;
        transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .splash-content {
        animation: splashReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .splash-brand {
        font-weight: 800;
        font-size: 2.5rem;
        letter-spacing: -0.05em;
        color: #ffffff;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      @keyframes splashReveal {
        0% {
          opacity: 0;
          transform: scale(0.96) translateY(10px);
          filter: blur(10px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
          filter: blur(0);
        }
      }

      .splash-hidden {
        opacity: 0;
      }

      /* --- 2. MAIN VIEWPORT & VIDEO --- */
      .video-viewport {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 1;
      }

      #result-display {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* --- 3. BRANDING OVERLAY --- */
      .brand-overlay {
        position: fixed;
        top: 24px;
        left: 24px;
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: none;
      }

      .status-pill {
        width: 10px;
        height: 10px;
        background: #475569;
        border-radius: 50%;
        transition: all 0.4s ease;
      }
      .status-pill.active {
        background: #22c55e;
        box-shadow: 0 0 12px #22c55e;
      }

      /* --- 4. SETTINGS PANEL --- */
      .settings-panel {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        padding: 24px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 320px;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .settings-panel.hidden-panel {
        transform: translateX(calc(100% + 40px));
      }

      .toggle-btn {
        position: absolute;
        left: -54px;
        top: 0;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        color: white;
        padding: 12px;
        border-radius: 12px 0 0 12px;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-right: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loading-spinner {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .fade-in {
        animation: fadeIn 0.6s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" class="splash-container">
      <div class="splash-content">
        <h1 class="splash-brand">
          SEAL DETECTOR <span class="text-blue-500">PRO</span>
        </h1>
      </div>
    </div>

    <div class="brand-overlay">
      <div id="status-pill" class="status-pill"></div>
      <div class="flex flex-col">
        <h1 class="text-white font-bold tracking-tight text-lg drop-shadow-md">
          Seal Detector <span class="text-blue-500">PRO</span>
        </h1>
        <p
          id="live-indicator"
          class="text-[10px] uppercase tracking-widest text-gray-400 font-bold"
        >
          Offline
        </p>
      </div>
    </div>

    <div class="video-viewport">
      <div id="loading-state" class="flex flex-col items-center text-center">
        <div id="spinner" class="loading-spinner mb-4"></div>
        <p id="status-text" class="text-white text-sm font-medium px-6">
          Initializing System...
        </p>
      </div>
      <img id="result-display" class="hidden" />
    </div>

    <div id="settings-panel" class="settings-panel">
      <div id="toggle-settings" class="toggle-btn shadow-lg">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          />
        </svg>
      </div>

      <h2 class="text-xl font-bold text-white mb-4">Configuration</h2>

      <div class="mb-4">
        <label
          class="block text-xs font-bold text-blue-400 uppercase tracking-wider mb-2"
          >Camera Source</label
        >
        <input
          type="text"
          id="rtsp-input"
          placeholder="rtsp://...  OR  0  OR  video.mp4"
          class="w-full bg-slate-800 border border-slate-700 text-white p-3 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <button
        id="save-button"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition-all shadow-lg active:scale-95"
      >
        Update & Save
      </button>

      <p class="text-[10px] text-gray-400 mt-4 leading-relaxed text-center">
        Settings are saved locally. Close this panel to view the full screen.
      </p>
    </div>

    <script>
      const rtspInput = document.getElementById("rtsp-input");
      const saveButton = document.getElementById("save-button");
      const resultDisplay = document.getElementById("result-display");
      const loadingState = document.getElementById("loading-state");
      const spinner = document.getElementById("spinner");
      const statusText = document.getElementById("status-text");
      const statusPill = document.getElementById("status-pill");
      const liveIndicator = document.getElementById("live-indicator");
      const settingsPanel = document.getElementById("settings-panel");
      const toggleSettings = document.getElementById("toggle-settings");
      const splash = document.getElementById("app-splash");

      window.addEventListener("DOMContentLoaded", () => {
        // Handle Splash Screen Removal
        setTimeout(() => {
          if (splash) {
            splash.classList.add("splash-hidden");
            setTimeout(() => splash.remove(), 1200);
          }
        }, 2500);

        // Load Saved Configuration
        const savedUrl = localStorage.getItem("rtsp_url");
        if (savedUrl) {
          rtspInput.value = savedUrl;
          startStream(savedUrl);
          settingsPanel.classList.add("hidden-panel");
        } else {
          statusText.innerText = "Please configure Camera Source";
          spinner.classList.add("hidden");
        }
      });

      toggleSettings.addEventListener("click", () => {
        settingsPanel.classList.toggle("hidden-panel");
      });

      saveButton.addEventListener("click", () => {
        const url = rtspInput.value.trim();
        if (!url) return alert("Please enter a valid URL");
        localStorage.setItem("rtsp_url", url);
        startStream(url);
        saveButton.innerText = "Saved!";
        setTimeout(() => {
          saveButton.innerText = "Update & Save";
          settingsPanel.classList.add("hidden-panel");
        }, 800);
      });

      function startStream(source) {
        loadingState.classList.remove("hidden");
        spinner.classList.remove("hidden");
        statusText.innerText = "Connecting to Stream...";
        resultDisplay.classList.add("hidden");

        statusPill.classList.remove("active");
        liveIndicator.innerText = "Offline";
        liveIndicator.classList.remove("text-red-500");

        const backendUrl = `/predict/stream?source=${encodeURIComponent(source)}`;
        // Cache-busting timestamp
        resultDisplay.src =
          backendUrl +
          (backendUrl.includes("?") ? "&" : "?") +
          "t=" +
          Date.now();

        resultDisplay.onload = () => {
          loadingState.classList.add("hidden");
          resultDisplay.classList.remove("hidden");
          resultDisplay.classList.add("fade-in");

          statusPill.classList.add("active");
          liveIndicator.innerText = "Live Stream";
          liveIndicator.classList.add("text-red-500");
        };

        resultDisplay.onerror = () => {
          loadingState.classList.remove("hidden");
          spinner.classList.add("hidden");
          statusText.innerText = "Connection Failed - Check RTSP URL";
          resultDisplay.classList.add("hidden");
          statusPill.classList.remove("active");
          liveIndicator.innerText = "Connection Error";
        };
      }
    </script>
  </body>
</html>
